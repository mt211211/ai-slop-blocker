<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <style>
      * { box-sizing: border-box; }
      body { width: 440px; height: 280px; margin: 0; overflow: hidden; background: radial-gradient(circle at 90% 5%, #ffdc77, transparent 160px), #f7f1e5; color: #171510; font-family: Arial, sans-serif; }
      main { position: relative; height: 100%; padding: 27px 29px; }
      .icon { position: relative; width: 52px; height: 52px; border: 3px solid #171510; border-radius: 12px; overflow: hidden; background: #ffcb45; box-shadow: 4px 4px 0 #171510; }
      .icon:before { content: ""; position: absolute; left: 11px; top: 16px; width: 27px; height: 19px; border: 3px solid #171510; background: #fffdf8; }
      .icon:after { content: ""; position: absolute; left: -7px; top: 22px; width: 65px; height: 8px; transform: rotate(45deg); border-block: 2px solid #171510; background: #f43f2f; }
      p { margin: 18px 0 4px; color: #f43f2f; font-size: 11px; font-weight: 900; letter-spacing: .12em; text-transform: uppercase; }
      h1 { margin: 0; font-size: 52px; line-height: .91; letter-spacing: -.07em; }
      h1 span { color: #f43f2f; }
      .stamp { position: absolute; right: 23px; bottom: 28px; transform: rotate(-9deg); border: 6px double #f43f2f; border-radius: 7px; padding: 5px 9px; color: #f43f2f; font: 1000 24px monospace; letter-spacing: -.08em; }
    </style>
  </head>
  <body>
    <main>
      <div class="icon"></div>
      <p>AI Slop Blocker</p>
      <h1>Less slop.<br><span>More blank.</span></h1>
      <div class="stamp">BLOCKED</div>
    </main>
  </body>
</html>
