<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Personal Filters | AI Slop Blocker</title>
    <link rel="stylesheet" href="../../extension/options/options.css">
    <style>
      main { margin-top: 34px; margin-bottom: 40px; }
      header { margin-bottom: 24px; }
      h1 { font-size: 58px; }
      .card { margin-top: 18px; padding: 20px; }
    </style>
    <script>
      const captureState = {
        personalRules: [
          { id: "1", type: "creator-url", value: "example.com/pixelmaker", label: "Pixel Maker", host: "example.com", createdAt: 1 },
          { id: "2", type: "phrase", value: "suspiciously polished sunrise", label: "Suspiciously polished sunrise", host: "", createdAt: 2 }
        ]
      };
      const changeListeners = [];
      window.chrome = {
        storage: {
          local: {
            get: async (defaults) => ({ ...defaults, ...captureState }),
            set: async (changes) => {
              const previous = { ...captureState };
              Object.assign(captureState, changes);
              const events = {};
              for (const [key, value] of Object.entries(changes)) {
                events[key] = { oldValue: previous[key], newValue: value };
              }
              changeListeners.forEach((listener) => listener(events, "local"));
            }
          },
          onChanged: { addListener: (listener) => changeListeners.push(listener) }
        }
      };
    </script>
  </head>
  <body>
    <main>
      <header>
        <img src="../../extension/icons/icon-128.png" width="72" height="72" alt="">
        <div>
          <p class="eyebrow">Your private filter list</p>
          <h1>Personal filters</h1>
          <p>Rules stay on this device. They are never uploaded or shared.</p>
        </div>
      </header>

      <section class="card">
        <h2>Add a filter</h2>
        <form id="ruleForm">
          <label>
            Filter type
            <select id="ruleType">
              <option value="phrase">Phrase or label</option>
              <option value="creator-url">Creator or channel URL</option>
              <option value="content-url">Specific content URL</option>
            </select>
          </label>
          <label>
            Value
            <input id="ruleValue" type="text" required placeholder="Example: AI animation">
          </label>
          <label>
            Website restriction <span>(optional)</span>
            <input id="ruleHost" type="text" placeholder="Example: youtube.com">
          </label>
          <button class="primary" type="submit">Add filter</button>
        </form>
        <p class="hint">The easiest method is the extension popup's "Block something as AI" picker, which creates a filter from the page for you.</p>
      </section>

      <section class="card">
        <div class="section-heading">
          <div><h2>Saved filters</h2><p id="ruleCount">0 rules</p></div>
          <button id="clearButton" class="danger" type="button">Clear all</button>
        </div>
        <div id="emptyState" class="empty">No personal filters yet.</div>
        <ul id="ruleList"></ul>
      </section>

      <p id="notice" class="notice" aria-live="polite"></p>
    </main>
    <script src="../../extension/options/options.js"></script>
    <script>
      window.setTimeout(() => { document.documentElement.dataset.captureReady = "true"; }, 100);
    </script>
  </body>
</html>
