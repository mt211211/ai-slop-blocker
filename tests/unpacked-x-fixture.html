<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="ai-slop-blocker-test-host" content="x.com">
    <title>Unpacked extension X fixture</title>
    <style>
      body { max-width: 680px; margin: 40px auto; font: 18px system-ui; }
      article { min-height: 120px; border: 2px solid #222; padding: 18px; }
    </style>
  </head>
  <body>
    <section id="feed" role="feed" aria-label="Home timeline">
      <article id="ai-post" data-testid="tweet"><p>My AI-generated image.</p></article>
      <article id="human-post" data-testid="tweet"><p>An ordinary human post.</p></article>
    </section>
    <script>
      window.setTimeout(() => {
        const post = document.createElement("article");
        post.id = "dynamic-ai-post";
        post.dataset.testid = "tweet";
        post.innerHTML = "<p>New AI-generated video.</p>";
        document.getElementById("feed").append(post);
      }, 300);
    </script>
  </body>
</html>
