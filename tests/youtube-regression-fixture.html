<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="ai-slop-blocker-test-host" content="youtube.com">
    <title>YouTube regression fixture</title>
    <link rel="stylesheet" href="../extension/content.css">
    <script>
      window.chrome = {
        storage: {
          local: {
            get: async () => ({
              enabled: true,
              personalRules: [
                {
                  id: "youtube-content-rule",
                  type: "content-url",
                  value: "youtube.com/watch?v=blocked",
                  label: "Blocked video",
                  host: "youtube.com"
                }
              ]
            })
          },
          onChanged: { addListener: () => {} }
        },
        runtime: {
          onMessage: { addListener: () => {} },
          sendMessage: async () => {}
        }
      };
    </script>
  </head>
  <body>
    <ytd-app id="app">
      <ytd-browse id="browse">
        <div id="contents">
          <ytd-rich-item-renderer id="ai-card">
            <a id="video-title" title="That's AI (2026) - Short Film">That's AI (2026) - Short Film</a>
          </ytd-rich-item-renderer>
          <ytd-rich-item-renderer id="human-card">
            <a id="video-title" href="https://www.youtube.com/watch?v=human" title="A normal cooking video">A normal cooking video</a>
          </ytd-rich-item-renderer>
          <ytd-rich-item-renderer id="user-blocked-card">
            <a id="video-title" href="https://www.youtube.com/watch?v=blocked" title="An unlabeled video">An unlabeled video</a>
          </ytd-rich-item-renderer>
          <ytd-reel-video-renderer id="ai-short">
            <a id="video-title" href="https://www.youtube.com/shorts/ai-short" title="AI animation short">AI animation short</a>
          </ytd-reel-video-renderer>
          <ytd-reel-video-renderer id="human-short">
            <a id="video-title" href="https://www.youtube.com/shorts/human-short" title="A normal travel short">A normal travel short</a>
          </ytd-reel-video-renderer>
        </div>
      </ytd-browse>

      <div id="player-container-outer">Video player</div>
      <ytd-watch-metadata id="watch-metadata">
        <h1>Made by AI: a short film</h1>
      </ytd-watch-metadata>
    </ytd-app>

    <output id="result">PENDING</output>
    <script src="../extension/content.js"></script>
    <script>
      window.setTimeout(() => {
        const aiCardHidden = document.getElementById("ai-card").classList.contains("ai-slop-blocker-hidden");
        const humanCardVisible = !document.getElementById("human-card").classList.contains("ai-slop-blocker-hidden");
        const userBlockedCardHidden = document.getElementById("user-blocked-card").classList.contains("ai-slop-blocker-hidden");
        const aiShortHidden = document.getElementById("ai-short").classList.contains("ai-slop-blocker-hidden");
        const humanShortVisible = !document.getElementById("human-short").classList.contains("ai-slop-blocker-hidden");
        const browseVisible = !document.getElementById("browse").classList.contains("ai-slop-blocker-hidden");
        const playerHidden = document.getElementById("player-container-outer").classList.contains("ai-slop-blocker-hidden");
        const metadataHidden = document.getElementById("watch-metadata").classList.contains("ai-slop-blocker-hidden");
        document.getElementById("result").textContent =
          aiCardHidden && humanCardVisible && userBlockedCardHidden && aiShortHidden && humanShortVisible && browseVisible && playerHidden && metadataHidden ? "PASS" : "FAIL";
      }, 350);
    </script>
  </body>
</html>
